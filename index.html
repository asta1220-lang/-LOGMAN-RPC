<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Precio del Aguacate · Michoacán & Jalisco</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,400&family=Azeret+Mono:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0f08;
  --bg2: #111408;
  --borde: rgba(158,212,58,0.16);
  --verde: #4e9a25;
  --neon: #9ed43a;
  --palido: #c8e8a8;
  --crema: #f4f1e6;
  --suave: #6a7a52;
  --naranja: #d4561c;
  --card-bg: rgba(255,255,255,0.035);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--crema);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── HERO ── */
.hero {
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(78,154,37,0.18) 0%, transparent 70%),
    linear-gradient(180deg, #0a1a05 0%, #0c0f08 100%);
  padding: 4rem 2rem 5rem;
  text-align: center;
  position: relative;
  overflow: hidden;
  border-bottom: 1px solid var(--borde);
}

/* decoración de fondo */
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle at 15% 50%, rgba(158,212,58,0.04) 0%, transparent 50%),
    radial-gradient(circle at 85% 20%, rgba(78,154,37,0.06) 0%, transparent 40%);
  pointer-events: none;
}

.hero-aguacate {
  position: absolute;
  right: -2%;
  bottom: -15px;
  font-size: 220px;
  opacity: 0.05;
  transform: rotate(-20deg);
  pointer-events: none;
  line-height: 1;
}

.hero-aguacate-left {
  position: absolute;
  left: -3%;
  top: -20px;
  font-size: 160px;
  opacity: 0.04;
  transform: rotate(15deg) scaleX(-1);
  pointer-events: none;
  line-height: 1;
}

.hero-eye {
  font-family: 'Azeret Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 4px;
  color: var(--neon);
  opacity: 0.65;
  margin-bottom: 18px;
}

.hero-h1 {
  font-family: 'Fraunces', serif;
  font-size: clamp(42px, 7vw, 72px);
  font-weight: 700;
  color: var(--palido);
  line-height: 1.05;
  margin-bottom: 6px;
  letter-spacing: -1px;
}

.hero-h1 em {
  font-style: italic;
  font-weight: 300;
  color: rgba(200,232,168,0.6);
}

.hero-estados {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin: 1.2rem 0 1.8rem;
  flex-wrap: wrap;
}

.estado-tag {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: rgba(158,212,58,0.08);
  border: 1px solid rgba(158,212,58,0.22);
  border-radius: 100px;
  padding: 6px 16px;
  font-size: 13px;
  font-family: 'Azeret Mono', monospace;
  color: var(--palido);
}

.estado-ico { font-size: 15px; }

.divider {
  width: 1px;
  height: 20px;
  background: rgba(158,212,58,0.2);
}

.hero-update {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--borde);
  border-radius: 100px;
  padding: 7px 20px;
  font-size: 12px;
  font-family: 'Azeret Mono', monospace;
  color: var(--suave);
}

.dot-live {
  width: 7px; height: 7px;
  background: var(--neon);
  border-radius: 50%;
  animation: blink 2s infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

/* ── WRAP ── */
.wrap {
  max-width: 800px;
  margin: 0 auto;
  padding: 2.5rem 1.5rem;
  flex: 1;
}

/* ── ESTADO CARGA ── */
.loading-box {
  background: var(--card-bg);
  border: 1px solid var(--borde);
  border-radius: 20px;
  padding: 3rem 2rem;
  text-align: center;
  margin-bottom: 1.5rem;
}

.loading-label {
  font-family: 'Azeret Mono', monospace;
  font-size: 12px;
  color: var(--suave);
  margin-bottom: 1.5rem;
  letter-spacing: 0.5px;
}

.skel {
  height: 13px;
  background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 6px;
  margin: 10px auto;
}
@keyframes shimmer { to { background-position: -200% 0; } }

/* ── REGIÓN CARDS ── */
.region-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.2rem;
  margin-bottom: 1.5rem;
}

@media(max-width: 600px) {
  .region-grid { grid-template-columns: 1fr; }
  .hero { padding: 3rem 1.2rem 4rem; }
  .wrap { padding: 1.8rem 1rem; }
}

.region-card {
  background: var(--card-bg);
  border: 1px solid var(--borde);
  border-radius: 20px;
  padding: 1.6rem;
  animation: up 0.45s ease both;
  transition: border-color 0.2s, transform 0.2s;
  position: relative;
  overflow: hidden;
}

.region-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  border-radius: 20px 20px 0 0;
}

.region-card.mich::before { background: linear-gradient(90deg, #9ed43a, #4e9a25); }
.region-card.jal::before  { background: linear-gradient(90deg, #e8a020, #d4561c); }

.region-card:hover {
  border-color: rgba(158,212,58,0.3);
  transform: translateY(-3px);
}

@keyframes up {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

.region-label {
  font-family: 'Azeret Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--suave);
  margin-bottom: 6px;
}

.region-nombre {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--palido);
  margin-bottom: 4px;
}

.region-tipo {
  font-size: 12px;
  color: var(--suave);
  font-style: italic;
  margin-bottom: 1.2rem;
}

.precio-rango {
  font-family: 'Fraunces', serif;
  font-size: 42px;
  font-weight: 700;
  color: var(--neon);
  line-height: 1;
  margin-bottom: 4px;
  letter-spacing: -1px;
}

.precio-unidad {
  font-size: 12px;
  font-family: 'Azeret Mono', monospace;
  color: var(--suave);
  margin-bottom: 1.2rem;
}

.tendencia {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  font-family: 'Azeret Mono', monospace;
  padding: 4px 12px;
  border-radius: 100px;
  font-weight: 600;
}

.tend-sube { background: rgba(212,86,28,0.15); color: #e87040; border: 1px solid rgba(212,86,28,0.25); }
.tend-baja { background: rgba(78,154,37,0.12); color: var(--neon); border: 1px solid rgba(158,212,58,0.2); }
.tend-estable { background: rgba(255,255,255,0.05); color: var(--suave); border: 1px solid rgba(255,255,255,0.08); }

/* submercados */
.submercados {
  margin-top: 1rem;
  padding-top: 1rem;
  border-top: 1px solid var(--borde);
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.sub-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
}

.sub-nombre { color: var(--suave); font-family: 'Azeret Mono', monospace; }
.sub-precio { color: var(--palido); font-family: 'Fraunces', serif; font-size: 16px; }

/* ── NOTA FUENTE ── */
.fuente-box {
  background: rgba(158,212,58,0.04);
  border: 1px solid var(--borde);
  border-left: 3px solid var(--verde);
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 12px;
  color: var(--suave);
  line-height: 1.6;
  margin-bottom: 1.5rem;
}

.fuente-box strong { color: var(--palido); }

/* ── BTN ACTUALIZAR ── */
.btn-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.4rem;
  flex-wrap: wrap;
  gap: 10px;
}

.sec-title {
  font-family: 'Fraunces', serif;
  font-size: 20px;
  color: var(--palido);
}

.btn-act {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: var(--verde);
  color: #0c0f08;
  border: none;
  border-radius: 10px;
  padding: 9px 18px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-act:hover { background: var(--neon); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(78,154,37,.3); }
.btn-act:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
.spin { animation: girar 0.8s linear infinite; }
@keyframes girar { to { transform: rotate(360deg); } }

/* ── FOOTER ── */
footer {
  text-align: center;
  padding: 1.5rem;
  border-top: 1px solid var(--borde);
  font-size: 11px;
  font-family: 'Azeret Mono', monospace;
  color: var(--suave);
}
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-aguacate-left">🥑</div>
  <div class="hero-aguacate">🥑</div>

  <div class="hero-eye">Precios del mercado · México</div>
  <div class="hero-h1">Aguacate <em>hoy</em></div>

  <div class="hero-estados">
    <div class="estado-tag"><span class="estado-ico">🌿</span> Michoacán</div>
    <div class="divider"></div>
    <div class="estado-tag"><span class="estado-ico">🌵</span> Jalisco</div>
  </div>

  <div class="hero-update">
    <div class="dot-live"></div>
    <span id="hero-fecha">Cargando...</span>
  </div>
</div>

<!-- CONTENIDO -->
<div class="wrap">

  <div class="btn-bar">
    <div class="sec-title">Precios del día</div>
    <button class="btn-act" id="btn-act" onclick="actualizar()">
      <svg id="ico-ref" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M23 4v6h-6M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
      </svg>
      Actualizar
    </button>
  </div>

  <!-- Grid de cards (se llena por JS) -->
  <div class="region-grid" id="grid">
    <div class="loading-box" style="grid-column:1/-1;">
      <div class="loading-label">Consultando precios con IA...</div>
      <div class="skel" style="width:55%;"></div>
      <div class="skel" style="width:75%;"></div>
      <div class="skel" style="width:45%;"></div>
    </div>
  </div>

  <!-- Fuente (se llena por JS) -->
  <div class="fuente-box" id="fuente-box" style="display:none;"></div>

</div>

<footer id="pie">Actualización automática diaria · Precios orientativos en pesos mexicanos</footer>

<script>
const K_DATA  = 'agu_nac_data';
const K_FECHA = 'agu_nac_fecha';

function hoy() { return new Date().toISOString().split('T')[0]; }

function fechaLeg() {
  return new Date().toLocaleDateString('es-MX', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });
}

// ── FALLBACK si la API falla ──
function fallback() {
  return {
    michoacan: {
      nombre: 'Michoacán',
      subtitulo: 'Zona origen · Uruapan / Tancítaro',
      tipo: 'Hass',
      min: 22, max: 32,
      tendencia: 'sube',
      submercados: [
        { nombre: 'Uruapan (mercado)', precio: '$24–30 / kg' },
        { nombre: 'Tancítaro (huerta)', precio: '$22–28 / kg' },
      ]
    },
    jalisco: {
      nombre: 'Jalisco',
      subtitulo: 'Zona consumo · Guadalajara / Tlajomulco',
      tipo: 'Hass Premium',
      min: 38, max: 52,
      tendencia: 'estable',
      submercados: [
        { nombre: 'Central de Abastos GDL', precio: '$38–48 / kg' },
        { nombre: 'Mercado San Juan de Dios', precio: '$42–52 / kg' },
      ]
    },
    fuente: 'Datos de referencia del mercado (actualiza para datos en tiempo real)',
    nota: 'Precios orientativos. Pueden variar según calidad y punto de venta.'
  };
}

// ── RENDER CARDS ──
function tClass(t) { return t === 'sube' ? 'tend-sube' : t === 'baja' ? 'tend-baja' : 'tend-estable'; }
function tIcon(t)  { return t === 'sube' ? '↑' : t === 'baja' ? '↓' : '→'; }
function tLabel(t) { return t === 'sube' ? 'Subiendo' : t === 'baja' ? 'Bajando' : 'Estable'; }

function renderCard(data, clase, delay) {
  const subs = (data.submercados || []).map(s => `
    <div class="sub-row">
      <span class="sub-nombre">${s.nombre}</span>
      <span class="sub-precio">${s.precio}</span>
    </div>`).join('');

  return `
    <div class="region-card ${clase}" style="animation-delay:${delay}s;">
      <div class="region-label">Estado</div>
      <div class="region-nombre">${data.nombre}</div>
      <div class="region-tipo">${data.subtitulo}</div>
      <div class="precio-rango">$${data.min}–${data.max}</div>
      <div class="precio-unidad">pesos / kg · ${data.tipo}</div>
      <div class="tendencia ${tClass(data.tendencia)}">${tIcon(data.tendencia)} ${tLabel(data.tendencia)}</div>
      ${subs ? `<div class="submercados">${subs}</div>` : ''}
    </div>`;
}

function render(data) {
  const fechaStr = fechaLeg();
  document.getElementById('hero-fecha').textContent = 'Actualizado · ' + fechaStr;

  document.getElementById('grid').innerHTML =
    renderCard(data.michoacan, 'mich', 0) +
    renderCard(data.jalisco,   'jal',  0.1);

  const fBox = document.getElementById('fuente-box');
  fBox.style.display = 'block';
  fBox.innerHTML = `<strong>Fuente:</strong> ${data.fuente}<br>${data.nota}`;

  document.getElementById('pie').textContent =
    'Última actualización: ' + fechaStr + ' · Precios orientativos en pesos mexicanos';
}

// ── LLAMADA A CLAUDE API ──
async function actualizar() {
  const btn = document.getElementById('btn-act');
  const ico = document.getElementById('ico-ref');
  btn.disabled = true;
  ico.classList.add('spin');

  document.getElementById('grid').innerHTML = `
    <div class="loading-box" style="grid-column:1/-1;">
      <div class="loading-label">Buscando precios actuales con IA...</div>
      <div class="skel" style="width:60%;"></div>
      <div class="skel" style="width:80%;"></div>
      <div class="skel" style="width:50%;"></div>
      <div class="skel" style="width:70%;"></div>
    </div>`;

  document.getElementById('fuente-box').style.display = 'none';
  document.getElementById('hero-fecha').textContent = 'Actualizando...';

  try {
    const fechaHoy = fechaLeg();

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        system: `Eres especialista en precios agrícolas de México. Busca en internet los precios actuales del aguacate hass SOLO en Michoacán y Jalisco. Responde ÚNICAMENTE con un JSON válido, sin texto, sin markdown, sin backticks. Estructura exacta:
{
  "michoacan": {
    "nombre": "Michoacán",
    "subtitulo": "Zona origen · Uruapan / Tancítaro",
    "tipo": "Hass",
    "min": 22,
    "max": 32,
    "tendencia": "estable",
    "submercados": [
      { "nombre": "Uruapan (mercado)", "precio": "$24–30 / kg" },
      { "nombre": "Tancítaro (huerta)", "precio": "$22–28 / kg" }
    ]
  },
  "jalisco": {
    "nombre": "Jalisco",
    "subtitulo": "Zona consumo · Guadalajara / Tlajomulco",
    "tipo": "Hass Premium",
    "min": 38,
    "max": 52,
    "tendencia": "sube",
    "submercados": [
      { "nombre": "Central de Abastos GDL", "precio": "$38–48 / kg" },
      { "nombre": "Mercado San Juan de Dios", "precio": "$42–52 / kg" }
    ]
  },
  "fuente": "texto breve de las fuentes consultadas",
  "nota": "contexto breve del mercado"
}
La tendencia puede ser: "sube", "baja" o "estable". Busca datos reales de hoy.`,
        messages: [{
          role: 'user',
          content: `Busca los precios del aguacate hass en Michoacán y Jalisco para hoy ${fechaHoy}. Dame solo el JSON.`
        }]
      })
    });

    const data = await res.json();
    const texto = (data.content || []).map(b => b.text || '').join('');
    const limpio = texto.replace(/```json|```/g, '').trim();

    let parsed;
    try { parsed = JSON.parse(limpio); }
    catch(e) { parsed = fallback(); }

    localStorage.setItem(K_DATA, JSON.stringify(parsed));
    localStorage.setItem(K_FECHA, hoy());
    render(parsed);

  } catch(err) {
    console.error(err);
    render(fallback());
  }

  btn.disabled = false;
  ico.classList.remove('spin');
}

// ── INIT ──
function init() {
  const fechaGuardada = localStorage.getItem(K_FECHA);
  const dataGuardada  = localStorage.getItem(K_DATA);

  if (fechaGuardada === hoy() && dataGuardada) {
    // Ya tenemos datos de hoy, los mostramos directo
    render(JSON.parse(dataGuardada));
  } else {
    // Datos viejos o sin datos → actualizar
    actualizar();
  }
}

// Checa cada hora si ya cambió el día
setInterval(() => {
  if (localStorage.getItem(K_FECHA) !== hoy()) actualizar();
}, 60 * 60 * 1000);

init();
</script>
</body>
</html>
